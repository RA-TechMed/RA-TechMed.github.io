<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="rubyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6bbf;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5c3fa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3c2870;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#1a1a2e"/>
  
  <!-- Stylized gem/diamond shape - represents Ruby -->
  <polygon points="100,20 160,80 140,160 100,180 60,160 40,80" fill="url(#rubyGrad)"/>
  
  <!-- Highlight facets for depth -->
  <polygon points="100,20 130,55 100,80" fill="rgba(255,255,255,0.3)"/>
  <polygon points="160,80 140,100 150,130" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Center light reflection -->
  <circle cx="100" cy="70" r="8" fill="rgba(255,255,255,0.6)"/>
</svg>
