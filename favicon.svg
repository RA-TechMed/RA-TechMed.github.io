<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3fa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6bbf;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#grad1)"/>
  
  <!-- Decorative geometric elements -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Initials -->
  <text x="100" y="120" font-size="72" font-weight="700" text-anchor="middle" fill="white" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="2">
    RE
  </text>
  
  <!-- Decorative dot accent -->
  <circle cx="160" cy="50" r="6" fill="rgba(255,255,255,0.6)"/>
  <circle cx="50" cy="160" r="4" fill="rgba(255,255,255,0.4)"/>
</svg>
